<!doctype html>
<html lang="id">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>PanduCore | Teman Pajak Digital</title>
  <meta name="description" content="PanduCore membantu wajib pajak mandiri memahami kebutuhan pajak, menyiapkan dokumen, dan mengikuti panduan Coretax dengan bahasa yang mudah dipahami." />
  <style>
    :root{
      --navy:#071B33;
      --navy-2:#0B2545;
      --blue:#1559B7;
      --blue-2:#0F4792;
      --gold:#F5B700;
      --gold-2:#D99A00;
      --ink:#132238;
      --muted:#61738C;
      --line:#D8E0EA;
      --surface:#FFFFFF;
      --surface-2:#F5F8FC;
      --surface-3:#EEF4FA;
      --success:#157347;
      --warn:#B7791F;
      --danger:#B42318;
      --shadow:0 18px 45px rgba(7,27,51,.14);
      --shadow-soft:0 10px 28px rgba(7,27,51,.09);
      --radius:22px;
      --radius-sm:14px;
      --focus:0 0 0 4px rgba(245,183,0,.28);
      --max:1180px;
      --font:Inter, ui-sans-serif, system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", Arial, sans-serif;
    }

    *{box-sizing:border-box}
    html{scroll-behavior:smooth}
    body{
      margin:0;
      font-family:var(--font);
      background:var(--surface-2);
      color:var(--ink);
      min-height:100vh;
      line-height:1.5;
    }
    button,input,select,textarea{font:inherit}
    button{cursor:pointer}
    a{color:var(--blue)}
    .sr-only{position:absolute;left:-9999px;width:1px;height:1px;overflow:hidden}
    .skip-link{position:absolute;left:16px;top:-80px;background:var(--navy);color:#fff;padding:12px 16px;border-radius:10px;z-index:99}
    .skip-link:focus{top:16px}
    :focus-visible{outline:none;box-shadow:var(--focus)}

    .app-shell{min-height:100vh;display:flex;flex-direction:column}
    .topbar{
      position:sticky;
      top:0;
      z-index:40;
      background:#fff;
      border-bottom:1px solid var(--line);
    }
    .topbar-inner{
      max-width:var(--max);
      margin:0 auto;
      padding:14px 22px;
      display:flex;
      align-items:center;
      justify-content:space-between;
      gap:18px;
    }
    .brand{display:flex;align-items:center;gap:14px;min-width:310px}
    .logo-box{
      width:260px;
      height:82px;
      display:flex;
      align-items:center;
      justify-content:flex-start;
      overflow:hidden;
      flex:0 0 auto;
    }
    .logo-box img{width:260px;height:82px;object-fit:contain;display:block}
    .brand-copy{position:absolute;width:1px;height:1px;overflow:hidden;clip:rect(0 0 0 0);white-space:nowrap}
    .brand-copy strong{display:block;color:var(--navy);font-size:1.1rem;line-height:1.1}
    .brand-copy span{display:block;color:var(--muted);font-size:.82rem;margin-top:2px}
    .header-actions{display:flex;align-items:center;gap:10px;flex-wrap:wrap;justify-content:flex-end}
    .status-pill{display:inline-flex;align-items:center;gap:8px;border:1px solid var(--line);background:#fff;border-radius:999px;padding:9px 12px;color:var(--muted);font-size:.86rem}
    .status-dot{width:9px;height:9px;border-radius:99px;background:var(--gold)}
    .mini-btn{border:1px solid var(--line);background:#fff;color:var(--navy);border-radius:999px;padding:9px 12px;font-weight:700;font-size:.86rem}
    .mini-btn:hover{border-color:var(--blue);color:var(--blue)}

    .progress-wrap{background:#fff;border-bottom:1px solid var(--line)}
    .progress-inner{max-width:var(--max);margin:0 auto;padding:0 22px 14px}
    .progress-label{display:flex;justify-content:space-between;color:var(--muted);font-size:.82rem;margin-bottom:8px}
    .progress-track{height:10px;background:#E8EEF6;border-radius:999px;overflow:hidden}
    .progress-bar{height:100%;width:0;background:var(--gold);border-radius:999px;transition:width .28s ease}

    main{flex:1}
    .container{max-width:var(--max);margin:0 auto;padding:34px 22px 58px}
    .hero-grid{display:grid;grid-template-columns:1.08fr .92fr;gap:26px;align-items:stretch}
    .hero-brand-visual{display:flex;align-items:center;gap:16px;margin-bottom:22px;padding:16px 18px;border:1px solid var(--line);border-radius:22px;background:linear-gradient(135deg,#FFFFFF 0%,#F7FAFF 100%)}
    .hero-brand-visual img{width:360px;max-width:100%;height:auto;object-fit:contain;display:block}
    .hero-brand-caption{color:var(--muted);font-weight:700;font-size:.92rem;line-height:1.45}
    .panel{
      background:var(--surface);
      border:1px solid var(--line);
      border-radius:var(--radius);
      box-shadow:var(--shadow-soft);
    }
    .hero-card{padding:42px;position:relative;overflow:hidden;background:#fff}
    .hero-card:before{content:"";position:absolute;inset:0 0 auto auto;width:170px;height:170px;background:var(--gold);opacity:.12;border-radius:0 0 0 100%;pointer-events:none}
    .eyebrow{display:inline-flex;align-items:center;gap:8px;background:#FFF6D6;color:#6B4C00;border:1px solid #F7D66E;border-radius:999px;padding:8px 12px;font-size:.84rem;font-weight:800;margin-bottom:18px}
    .hero-title{font-size:clamp(2rem,5vw,4.2rem);line-height:1.03;margin:0;color:var(--navy);letter-spacing:-.04em}
    .hero-subtitle{font-size:1.08rem;color:#42556F;max-width:650px;margin:18px 0 0}
    .hero-actions{display:flex;gap:12px;flex-wrap:wrap;margin-top:26px}
    .btn{border:none;border-radius:14px;padding:13px 18px;font-weight:850;display:inline-flex;align-items:center;justify-content:center;gap:10px;transition:transform .16s ease, box-shadow .16s ease, background .16s ease}
    .btn:hover{transform:translateY(-1px)}
    .btn-primary{background:var(--blue);color:#fff;box-shadow:0 12px 24px rgba(21,89,183,.24)}
    .btn-primary:hover{background:var(--blue-2)}
    .btn-gold{background:var(--gold);color:#1E2A3D;box-shadow:0 12px 24px rgba(245,183,0,.24)}
    .btn-gold:hover{background:#EAAE00}
    .btn-light{background:#fff;color:var(--navy);border:1px solid var(--line)}
    .btn-light:hover{border-color:var(--blue);color:var(--blue)}
    .btn-danger{background:#FFF2F0;color:var(--danger);border:1px solid #F8C9C1}
    .btn-full{width:100%}
    .hero-notes{display:grid;grid-template-columns:repeat(3,1fr);gap:12px;margin-top:28px}
    .note{background:var(--surface-2);border:1px solid var(--line);border-radius:16px;padding:14px}
    .note strong{display:block;color:var(--navy);font-size:.94rem}
    .note span{display:block;color:var(--muted);font-size:.82rem;margin-top:4px}

    .screen-card{padding:28px}
    .screen-title{margin:0;color:var(--navy);font-size:1.8rem;line-height:1.15;letter-spacing:-.02em}
    .screen-lead{color:#4B5F78;margin:10px 0 0;max-width:780px}
    .section-title{font-size:1.1rem;margin:0 0 14px;color:var(--navy)}
    .form-grid{display:grid;gap:16px;margin-top:22px}
    .field{display:grid;gap:8px}
    label{font-weight:750;color:#27364B}
    input,select,textarea{
      width:100%;border:1px solid #C7D2E0;background:#fff;border-radius:14px;padding:13px 14px;color:var(--ink);outline:none;
    }
    input:focus,select:focus,textarea:focus{border-color:var(--blue);box-shadow:var(--focus)}
    .hint{color:var(--muted);font-size:.88rem}
    .warning-box,.info-box,.success-box{
      border-radius:16px;padding:16px 18px;margin-top:18px;border:1px solid;display:flex;gap:12px;align-items:flex-start
    }
    .warning-box{background:#FFF8E6;border-color:#F3D277;color:#59430A}
    .info-box{background:#EFF6FF;border-color:#BDD7FF;color:#153E73}
    .success-box{background:#EDFDF4;border-color:#B7E4C7;color:#135A37}
    .box-icon{width:24px;height:24px;min-width:24px;border-radius:8px;background:#fff;display:grid;place-items:center;font-weight:900}
    .error-text{color:var(--danger);font-size:.9rem;font-weight:750;min-height:1.2rem}

    .choice-grid{display:grid;grid-template-columns:repeat(2,minmax(0,1fr));gap:14px;margin-top:22px}
    .choice-card{
      position:relative;text-align:left;border:1px solid var(--line);background:#fff;border-radius:18px;padding:18px;transition:border .16s ease, transform .16s ease, box-shadow .16s ease;
    }
    .choice-card:hover{border-color:var(--blue);transform:translateY(-2px);box-shadow:var(--shadow-soft)}
    .choice-card.selected{border-color:var(--blue);box-shadow:0 0 0 4px rgba(21,89,183,.12)}
    .choice-card strong{display:block;color:var(--navy);font-size:1.02rem;margin-bottom:6px}
    .choice-card span{color:var(--muted);font-size:.92rem;display:block}
    .choice-card .badge{margin-top:12px}
    .badge{display:inline-flex;border-radius:999px;padding:6px 10px;background:#EEF4FA;color:#294462;font-size:.78rem;font-weight:850;border:1px solid #D4DFEC}
    .badge-gold{background:#FFF5D0;border-color:#F4D36F;color:#5D4300}
    .badge-blue{background:#EAF2FF;border-color:#BFD8FF;color:#123B70}
    .badge-red{background:#FFF1F0;border-color:#F4C7C3;color:#8D1E14}
    .badge-green{background:#EAF8F0;border-color:#B9E4C8;color:#14603A}

    .question-shell{display:grid;grid-template-columns:260px 1fr;gap:22px;align-items:start}
    .side-panel{position:sticky;top:126px;padding:20px;background:#fff;border:1px solid var(--line);border-radius:20px;box-shadow:var(--shadow-soft)}
    .side-panel h3{margin:0 0 10px;color:var(--navy)}
    .side-list{list-style:none;padding:0;margin:16px 0 0;display:grid;gap:10px}
    .side-list li{display:flex;gap:10px;align-items:center;color:var(--muted);font-size:.9rem}
    .side-num{width:24px;height:24px;border-radius:8px;background:#EEF4FA;color:#294462;display:grid;place-items:center;font-size:.78rem;font-weight:900}
    .question-card{padding:28px;min-height:420px;display:flex;flex-direction:column}
    .question-top{display:flex;align-items:center;justify-content:space-between;gap:12px;margin-bottom:14px}
    .question-count{font-size:.86rem;color:var(--muted);font-weight:800}
    .question-title{font-size:1.6rem;color:var(--navy);margin:0;line-height:1.2;letter-spacing:-.02em}
    .question-helper{color:#4B5F78;margin:12px 0 0}
    .why-box{margin-top:14px;background:var(--surface-2);border:1px solid var(--line);border-radius:14px;padding:13px;color:#4B5F78;font-size:.92rem;display:none}
    .why-box.open{display:block}
    .answer-area{margin-top:24px;display:grid;gap:12px}
    .option-btn{
      text-align:left;border:1px solid #C9D5E4;background:#fff;border-radius:16px;padding:15px 16px;display:flex;justify-content:space-between;gap:12px;align-items:center;transition:.16s ease;color:var(--ink)
    }
    .option-btn:hover{border-color:var(--blue);box-shadow:var(--shadow-soft)}
    .option-btn.selected{border-color:var(--blue);background:#EFF6FF;box-shadow:0 0 0 4px rgba(21,89,183,.10)}
    .option-main strong{display:block;color:var(--navy)}
    .option-main span{display:block;color:var(--muted);font-size:.86rem;margin-top:2px}
    .checkmark{width:24px;height:24px;border-radius:999px;border:2px solid #B8C5D7;display:grid;place-items:center;color:#fff;font-weight:900;min-width:24px}
    .option-btn.selected .checkmark{background:var(--blue);border-color:var(--blue)}
    .question-footer{margin-top:auto;padding-top:24px;display:flex;justify-content:space-between;gap:12px;flex-wrap:wrap}

    .workspace-grid{display:grid;grid-template-columns:1fr 1fr;gap:18px;margin-top:22px}
    .small-card{border:1px solid var(--line);border-radius:18px;padding:18px;background:#fff}
    .small-card h3{margin:0 0 12px;color:var(--navy);font-size:1.05rem}

    .result-grid{display:grid;grid-template-columns:1.05fr .95fr;gap:20px;align-items:start}
    .result-card{padding:22px;border:1px solid var(--line);border-radius:20px;background:#fff;box-shadow:var(--shadow-soft)}
    .result-card h3{margin:0 0 12px;color:var(--navy)}
    .score-row{display:grid;grid-template-columns:repeat(3,1fr);gap:12px;margin-top:16px}
    .score-box{border:1px solid var(--line);border-radius:18px;background:#fff;padding:16px;text-align:center}
    .score-value{font-size:2rem;font-weight:950;color:var(--navy);line-height:1}
    .score-label{color:var(--muted);font-size:.82rem;margin-top:8px}
    .meter{height:10px;background:#E8EEF6;border-radius:999px;overflow:hidden;margin-top:12px}
    .meter span{display:block;height:100%;background:var(--blue);border-radius:999px;width:0}
    .list{margin:0;padding-left:20px;color:#30445D}
    .list li{margin:8px 0}
    .steps{counter-reset:step;display:grid;gap:12px;margin-top:8px}
    .step{display:grid;grid-template-columns:34px 1fr;gap:12px;align-items:start;border:1px solid var(--line);border-radius:16px;padding:14px;background:#fff}
    .step:before{counter-increment:step;content:counter(step);width:34px;height:34px;border-radius:12px;background:var(--navy);color:#fff;display:grid;place-items:center;font-weight:900}
    .step small{display:inline-flex;margin-bottom:7px;border:1px solid #D7E4F2;background:#F4F8FD;color:var(--blue);border-radius:999px;padding:3px 8px;font-size:.72rem;font-weight:850}
    .step strong{display:block;color:var(--navy);margin-bottom:4px}
    .step span{color:var(--muted);font-size:.92rem}
    .tag-cloud{display:flex;flex-wrap:wrap;gap:8px;margin-top:12px}
    .action-bar{display:flex;gap:10px;flex-wrap:wrap;margin-top:20px}

    .modal-backdrop{position:fixed;inset:0;background:rgba(7,27,51,.58);display:none;align-items:center;justify-content:center;padding:22px;z-index:80}
    .modal-backdrop.open{display:flex}
    .modal{background:#fff;border-radius:22px;box-shadow:var(--shadow);max-width:560px;width:100%;padding:24px;border:1px solid var(--line)}
    .modal-head{display:flex;align-items:start;justify-content:space-between;gap:12px}
    .modal h2{margin:0;color:var(--navy)}
    .close-btn{border:1px solid var(--line);background:#fff;border-radius:12px;padding:8px 10px;font-weight:900;color:var(--navy)}

    .footer{border-top:1px solid var(--line);background:#fff;color:var(--muted)}
    .footer-inner{max-width:var(--max);margin:0 auto;padding:22px;display:flex;justify-content:space-between;gap:14px;flex-wrap:wrap;font-size:.86rem}

    body.mobile-mode .container{max-width:520px}
    body.mobile-mode .topbar-inner{max-width:520px}
    body.mobile-mode .progress-inner{max-width:520px}
    body.mobile-mode .hero-grid,body.mobile-mode .result-grid,body.mobile-mode .workspace-grid,body.mobile-mode .question-shell{grid-template-columns:1fr}
    body.mobile-mode .side-panel{display:none}
    body.mobile-mode .hero-notes{grid-template-columns:1fr}
    body.mobile-mode .choice-grid{grid-template-columns:1fr}
    body.mobile-mode .question-card{min-height:calc(100vh - 230px)}
    body.mobile-mode .score-row{grid-template-columns:1fr 1fr}
    body.mobile-mode .hero-card{padding:22px}
    body.mobile-mode .screen-card{padding:18px}
    body.mobile-mode .topbar-inner{flex-direction:row;flex-wrap:wrap;align-items:center;padding:10px 16px}
    body.mobile-mode .brand{min-width:0}
    body.mobile-mode .header-actions{flex-wrap:wrap;gap:6px}
    body.mobile-mode .hero-title{font-size:clamp(1.6rem,6vw,2.8rem)}
    body.mobile-mode .result-grid{gap:14px}
    body.mobile-mode .mini-btn{font-size:.8rem;padding:7px 10px}
    body.mobile-mode .btn{padding:11px 14px;font-size:.9rem}

    @media(max-width:860px){
      .topbar-inner{align-items:flex-start;flex-direction:column;padding:10px 16px}
      .header-actions{justify-content:flex-start;gap:8px}
      .logo-box{width:175px;height:56px}
      .logo-box img{width:175px;height:56px}
      .hero-grid,.result-grid,.workspace-grid,.question-shell{grid-template-columns:1fr}
      .side-panel{position:relative;top:auto;display:none}
      .choice-grid{grid-template-columns:1fr}
      .hero-card{padding:20px}
      .hero-notes,.score-row{grid-template-columns:1fr 1fr}
      .container{padding:18px 14px 40px}
      .screen-card{padding:18px}
      .hero-title{font-size:clamp(1.8rem,5vw,3rem)}
      .result-grid{gap:14px}
      .question-card{padding:20px;min-height:auto}
      .workspace-grid{grid-template-columns:1fr}
    }
    @media(max-width:480px){
      .topbar-inner{padding:8px 12px}
      .logo-box{width:140px;height:44px}
      .logo-box img{width:140px;height:44px}
      .hero-notes,.score-row{grid-template-columns:1fr}
      .status-pill{display:none}
      .hero-card{padding:16px}
      .screen-card{padding:14px}
      .container{padding:12px 10px 32px}
      .btn{padding:10px 12px;font-size:.88rem}
      .question-title{font-size:1.3rem}
      .choice-grid{gap:10px}
      .hero-actions{gap:8px}
    }

    /* === AI LOADING OVERLAY === */
    .ai-loading-overlay{
      position:fixed;inset:0;z-index:9999;
      background:rgba(7,27,51,.72);
      display:flex;flex-direction:column;align-items:center;justify-content:center;
      gap:28px;
      backdrop-filter:blur(6px);
      -webkit-backdrop-filter:blur(6px);
      animation:fadeInOverlay .25s ease;
    }
    @keyframes fadeInOverlay{from{opacity:0}to{opacity:1}}
    .ai-loading-box{
      background:#fff;
      border-radius:24px;
      padding:36px 44px;
      text-align:center;
      max-width:380px;
      width:90%;
      box-shadow:0 24px 60px rgba(7,27,51,.22);
      animation:slideUpBox .3s cubic-bezier(.34,1.56,.64,1);
    }
    @keyframes slideUpBox{from{opacity:0;transform:translateY(28px)}to{opacity:1;transform:translateY(0)}}
    .ai-brain-icon{
      width:64px;height:64px;
      margin:0 auto 18px;
      position:relative;
    }
    .ai-brain-ring{
      position:absolute;inset:0;
      border:3px solid transparent;
      border-radius:50%;
      border-top-color:var(--blue);
      border-right-color:var(--gold);
      animation:spinRing 1.1s linear infinite;
    }
    .ai-brain-ring:nth-child(2){
      inset:8px;
      border-top-color:var(--gold);
      border-right-color:var(--blue);
      animation-duration:1.7s;
      animation-direction:reverse;
    }
    .ai-brain-ring:nth-child(3){
      inset:16px;
      border-top-color:#4f7bf7;
      animation-duration:2.3s;
    }
    @keyframes spinRing{to{transform:rotate(360deg)}}
    .ai-brain-dot{
      position:absolute;
      top:50%;left:50%;
      transform:translate(-50%,-50%);
      width:16px;height:16px;
      background:var(--navy);
      border-radius:50%;
      animation:pulseDot 1.2s ease-in-out infinite;
    }
    @keyframes pulseDot{0%,100%{transform:translate(-50%,-50%) scale(1)}50%{transform:translate(-50%,-50%) scale(1.3)}}
    .ai-loading-title{
      font-size:1.15rem;font-weight:850;color:var(--navy);margin:0 0 8px;
    }
    .ai-loading-desc{
      color:var(--muted);font-size:.92rem;margin:0 0 20px;
      line-height:1.5;
    }
    .ai-typing-dots{
      display:flex;align-items:center;justify-content:center;gap:6px;
    }
    .ai-typing-dots span{
      width:10px;height:10px;border-radius:50%;
      background:var(--gold);
      animation:bounceDot .9s ease-in-out infinite;
    }
    .ai-typing-dots span:nth-child(2){background:var(--blue);animation-delay:.18s}
    .ai-typing-dots span:nth-child(3){background:#4f7bf7;animation-delay:.36s}
    @keyframes bounceDot{0%,80%,100%{transform:scale(0.7);opacity:.5}40%{transform:scale(1.1);opacity:1}}
    .ai-steps-mini{
      display:flex;flex-direction:column;gap:8px;margin:16px 0 0;text-align:left;
    }
    .ai-step-item{
      display:flex;align-items:center;gap:10px;
      color:#4B5F78;font-size:.88rem;
      opacity:0;
      animation:fadeStep .4s ease forwards;
    }
    .ai-step-item:nth-child(1){animation-delay:.3s}
    .ai-step-item:nth-child(2){animation-delay:.8s}
    .ai-step-item:nth-child(3){animation-delay:1.3s}
    .ai-step-icon{
      width:22px;height:22px;border-radius:8px;
      background:var(--surface-3);display:grid;place-items:center;
      font-size:.82rem;flex-shrink:0;
    }
    @keyframes fadeStep{from{opacity:0;transform:translateX(-8px)}to{opacity:1;transform:translateX(0)}}

    /* ===== RESULT PAGE REDESIGN ===== */
    .result-hero{background:linear-gradient(135deg,#071B33 0%,#0B2545 60%,#1559B7 100%);border-radius:22px;padding:32px;color:#fff;margin-bottom:0;position:relative;overflow:hidden}
    .result-hero:before{content:'';position:absolute;top:-40px;right:-40px;width:200px;height:200px;background:rgba(245,183,0,.12);border-radius:50%}
    .result-hero:after{content:'';position:absolute;bottom:-60px;left:-30px;width:160px;height:160px;background:rgba(79,123,247,.10);border-radius:50%}
    .rh-top{display:flex;align-items:center;gap:20px;flex-wrap:wrap;position:relative;z-index:2}
    .rh-avatar{width:72px;height:72px;border-radius:50%;border:3px solid rgba(245,183,0,.6);background:rgba(255,255,255,.15);display:flex;align-items:center;justify-content:center;font-size:2rem;flex-shrink:0}
    .rh-name{flex:1}
    .rh-name h1{margin:0;font-size:1.5rem;color:#fff;letter-spacing:-.02em}
    .rh-name p{margin:4px 0 0;color:rgba(255,255,255,.7);font-size:.9rem}
    .rh-status-badge{display:inline-flex;align-items:center;gap:8px;padding:10px 18px;border-radius:999px;font-weight:850;font-size:.92rem;margin-top:16px;position:relative;z-index:2}
    .rh-status-badge.green{background:rgba(21,115,71,.9);color:#fff}
    .rh-status-badge.yellow{background:rgba(183,121,31,.9);color:#fff}
    .rh-status-badge.red{background:rgba(180,35,24,.9);color:#fff}
    .rh-insight{margin-top:14px;padding:14px 16px;background:rgba(255,255,255,.1);border-radius:14px;color:rgba(255,255,255,.9);font-size:.9rem;line-height:1.5;position:relative;z-index:2;border:1px solid rgba(255,255,255,.12)}
    .gauge-grid{display:grid;grid-template-columns:repeat(4,1fr);gap:14px;margin-top:20px}
    .gauge-wrap{background:#fff;border:1px solid var(--line);border-radius:18px;padding:18px 14px;text-align:center;box-shadow:var(--shadow-soft)}
    .gauge-svg-wrap{position:relative;width:84px;height:84px;margin:0 auto 10px}
    .gauge-svg{transform:rotate(-90deg)}
    .gauge-bg{fill:none;stroke:#E8EEF6;stroke-width:8}
    .gauge-fill{fill:none;stroke-width:8;stroke-linecap:round;transition:stroke-dashoffset 1.2s cubic-bezier(.4,0,.2,1)}
    .gauge-inner{position:absolute;inset:0;display:flex;flex-direction:column;align-items:center;justify-content:center}
    .gauge-num{font-size:1.35rem;font-weight:950;line-height:1;color:var(--navy)}
    .gauge-pct{font-size:.65rem;color:var(--muted);font-weight:700}
    .gauge-lbl{font-size:.8rem;color:#4B5F78;font-weight:750;line-height:1.3}
    .gauge-ctx{font-size:.72rem;color:var(--muted);margin-top:4px;line-height:1.3}
    .action-next-box{background:linear-gradient(135deg,#FFF6D6,#FFFBEE);border:2px solid var(--gold);border-radius:18px;padding:18px 20px;margin-bottom:14px;display:flex;gap:14px;align-items:flex-start}
    .action-next-icon{font-size:1.6rem;flex-shrink:0}
    .action-next-box h3{margin:0 0 4px;color:#5A3800;font-size:1rem}
    .action-next-box p{margin:0;color:#6B4C00;font-size:.9rem;line-height:1.5}
    .action-tier-label{font-size:.75rem;font-weight:900;letter-spacing:.06em;text-transform:uppercase;color:var(--muted);margin:16px 0 8px}
    .action-cards{display:grid;gap:10px}
    .action-card{display:flex;gap:12px;align-items:flex-start;border-radius:14px;padding:14px;border-left:4px solid transparent;background:#fff;border:1px solid var(--line)}
    .action-card.urgent{border-left:4px solid var(--danger);background:#FFF8F8}
    .action-card.soon{border-left:4px solid var(--gold);background:#FFFCF2}
    .action-card.later{border-left:4px solid var(--success);background:#F4FDF8}
    .action-card-icon{font-size:1.3rem;flex-shrink:0;margin-top:2px}
    .action-card h4{margin:0 0 3px;font-size:.92rem;color:var(--navy)}
    .action-card p{margin:0;font-size:.84rem;color:var(--muted);line-height:1.4}
    .checklist-progress{margin-bottom:14px}
    .checklist-pbar{height:8px;background:#E8EEF6;border-radius:999px;overflow:hidden;margin-top:6px}
    .checklist-pfill{height:100%;background:var(--success);border-radius:999px;transition:width .4s ease}
    .checklist-items{display:grid;gap:8px}
    .checklist-group-label{font-size:.75rem;font-weight:900;text-transform:uppercase;letter-spacing:.05em;color:var(--muted);margin:12px 0 6px}
    .cl-item{display:flex;align-items:center;gap:12px;padding:11px 13px;border-radius:12px;border:1px solid var(--line);background:#fff;cursor:pointer;transition:background .15s,border-color .15s}
    .cl-item:hover{background:var(--surface-2)}
    .cl-item.done{background:var(--surface-2);border-color:transparent}
    .cl-item.done .cl-label{text-decoration:line-through;color:var(--muted)}
    .cl-checkbox{width:22px;height:22px;border-radius:8px;border:2px solid #B8C5D7;flex-shrink:0;display:grid;place-items:center;transition:all .2s;background:#fff}
    .cl-item.done .cl-checkbox{background:var(--success);border-color:var(--success);color:#fff;animation:checkBounce .3s cubic-bezier(.34,1.56,.64,1)}
    @keyframes checkBounce{0%{transform:scale(0)}70%{transform:scale(1.15)}100%{transform:scale(1)}}
    .cl-label{font-size:.9rem;color:var(--ink);font-weight:600;flex:1}
    .cl-badge{font-size:.7rem;padding:3px 7px;border-radius:999px;font-weight:800}
    .cl-badge.req{background:#FFF1F0;color:var(--danger);border:1px solid #F4C7C3}
    .cl-badge.opt{background:var(--surface-3);color:var(--muted);border:1px solid var(--line)}
    .roadmap{position:relative;padding-left:36px;display:grid;gap:0}
    .roadmap:before{content:'';position:absolute;left:13px;top:12px;bottom:12px;width:2px;background:linear-gradient(to bottom,var(--blue),var(--gold))}
    .rm-step{position:relative;padding:0 0 20px;cursor:pointer}
    .rm-circle{position:absolute;left:-36px;top:2px;width:26px;height:26px;border-radius:50%;border:2px solid var(--line);background:#fff;display:grid;place-items:center;font-size:.75rem;transition:all .2s;z-index:1}
    .rm-step.done .rm-circle{background:var(--success);border-color:var(--success);color:#fff}
    .rm-step.active .rm-circle{background:var(--blue);border-color:var(--blue);color:#fff}
    .rm-meta{display:flex;align-items:center;gap:8px;flex-wrap:wrap;margin-bottom:4px}
    .rm-step small{display:inline-flex;border:1px solid var(--line);background:var(--surface-2);color:var(--muted);border-radius:999px;padding:2px 8px;font-size:.7rem;font-weight:850}
    .rm-step strong{display:block;color:var(--navy);font-size:.94rem}
    .rm-step span{color:var(--muted);font-size:.86rem;display:block;margin-top:2px;line-height:1.4}
    .rm-time{font-size:.72rem;color:var(--blue);font-weight:700;display:inline-flex;align-items:center;gap:4px}
    .rm-step.done strong{color:var(--muted);text-decoration:line-through}
    /* Tax Calendar */
    .cal-wrap{background:#fff;border:1px solid var(--line);border-radius:20px;overflow:hidden}
    .cal-header-bar{display:flex;align-items:center;justify-content:space-between;padding:14px 18px;background:var(--navy);color:#fff}
    .cal-header-bar h3{margin:0;font-size:1rem}
    .cal-nav{border:1px solid rgba(255,255,255,.3);background:transparent;color:#fff;border-radius:8px;padding:5px 10px;cursor:pointer;font-weight:700}
    .cal-nav:hover{background:rgba(255,255,255,.15)}
    .cal-weekdays{display:grid;grid-template-columns:repeat(7,1fr);background:var(--surface-3);text-align:center}
    .cal-weekdays span{padding:8px 4px;font-size:.72rem;font-weight:800;color:var(--muted);text-transform:uppercase}
    .cal-grid{display:grid;grid-template-columns:repeat(7,1fr);gap:1px;background:var(--line)}
    .cal-day{background:#fff;padding:6px;min-height:44px;text-align:center;position:relative;font-size:.82rem;color:var(--ink)}
    .cal-day.empty{background:var(--surface-2)}
    .cal-day.today{background:#EFF6FF}
    .cal-day.today .cal-day-num{font-weight:900;color:var(--blue)}
    .cal-day.event{cursor:pointer}
    .cal-day.event .cal-day-num{color:#fff;width:24px;height:24px;border-radius:50%;display:inline-flex;align-items:center;justify-content:center;margin:-2px auto 0}
    .cal-day.event-red .cal-day-num{background:var(--danger)}
    .cal-day.event-gold .cal-day-num{background:var(--warn)}
    .cal-day.event-blue .cal-day-num{background:var(--blue)}
    .cal-day-dot{width:5px;height:5px;border-radius:50%;margin:2px auto 0}
    .cal-countdown-list{padding:14px 18px;display:grid;gap:10px}
    .cal-countdown-item{display:flex;align-items:center;gap:12px;padding:10px 12px;border-radius:12px;border:1px solid var(--line)}
    .cal-evt-icon{font-size:1.2rem;flex-shrink:0}
    .cal-evt-info{flex:1}
    .cal-evt-info strong{display:block;font-size:.88rem;color:var(--navy)}
    .cal-evt-info span{font-size:.78rem;color:var(--muted)}
    .cal-evt-days{font-size:.78rem;font-weight:900;padding:4px 10px;border-radius:999px;white-space:nowrap}
    .cal-evt-days.urgent{background:#FFF1F0;color:var(--danger);border:1px solid #F4C7C3}
    .cal-evt-days.soon{background:#FFF8E6;color:var(--warn);border:1px solid #F3D277}
    .cal-evt-days.ok{background:#EAF8F0;color:var(--success);border:1px solid #B9E4C8}
    /* Premium Banner */
    .premium-banner{background:linear-gradient(135deg,#071B33 0%,#1559B7 50%,#0B2545 100%);border-radius:22px;padding:28px 30px;color:#fff;position:relative;overflow:hidden;margin-top:0}
    .premium-banner:before{content:'Γ£¿';position:absolute;top:-10px;right:20px;font-size:4rem;opacity:.15}
    .premium-badge{display:inline-flex;align-items:center;gap:6px;background:var(--gold);color:#1E2A3D;border-radius:999px;padding:5px 12px;font-size:.75rem;font-weight:900;margin-bottom:12px}
    .premium-banner h2{margin:0 0 8px;font-size:1.3rem;color:#fff}
    .premium-banner p{margin:0 0 20px;color:rgba(255,255,255,.8);font-size:.92rem;line-height:1.5}
    .btn-premium{background:var(--gold);color:#1E2A3D;border:none;border-radius:14px;padding:14px 24px;font-weight:900;font-size:1rem;cursor:pointer;display:inline-flex;align-items:center;gap:10px;transition:transform .15s,box-shadow .15s}
    .btn-premium:hover{transform:translateY(-2px);box-shadow:0 12px 28px rgba(245,183,0,.35)}
    /* Consultant List */
    .consult-header{display:flex;align-items:center;gap:14px;margin-bottom:22px;flex-wrap:wrap}
    .consult-header h1{margin:0;flex:1;color:var(--navy)}
    .filter-bar{display:flex;gap:10px;flex-wrap:wrap;margin-bottom:20px}
    .filter-btn{border:1px solid var(--line);background:#fff;color:var(--navy);border-radius:999px;padding:8px 14px;font-size:.84rem;font-weight:700;cursor:pointer;transition:.15s}
    .filter-btn.active{background:var(--navy);color:#fff;border-color:var(--navy)}
    .expert-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(280px,1fr));gap:18px}
    .expert-card{background:#fff;border:1px solid var(--line);border-radius:20px;padding:20px;box-shadow:var(--shadow-soft);transition:transform .16s,box-shadow .16s;position:relative}
    .expert-card:hover{transform:translateY(-3px);box-shadow:var(--shadow)}
    .expert-card.featured{border-color:var(--gold);}
    .expert-card.featured:before{content:'Γ¡É Terpopuler';position:absolute;top:-1px;right:16px;background:var(--gold);color:#1E2A3D;font-size:.7rem;font-weight:900;padding:4px 10px;border-radius:0 0 10px 10px}
    .expert-avatar{width:72px;height:72px;border-radius:50%;object-fit:cover;border:3px solid var(--surface-3);margin-bottom:12px}
    .expert-name{font-size:1.05rem;font-weight:850;color:var(--navy);margin:0 0 2px}
    .expert-title{font-size:.82rem;color:var(--muted);margin:0 0 10px}
    .expert-tags{display:flex;flex-wrap:wrap;gap:5px;margin-bottom:12px}
    .expert-tag{font-size:.72rem;padding:3px 8px;border-radius:999px;background:var(--surface-3);color:#294462;border:1px solid var(--line);font-weight:800}
    .expert-stats{display:flex;gap:12px;margin-bottom:14px;font-size:.82rem;color:var(--muted)}
    .expert-stat span{font-weight:750;color:var(--ink)}
    .expert-price{font-size:1.2rem;font-weight:950;color:var(--navy);margin-bottom:14px}
    .expert-price small{font-size:.78rem;font-weight:600;color:var(--muted)}
    .btn-choose{width:100%;background:var(--blue);color:#fff;border:none;border-radius:12px;padding:12px;font-weight:800;cursor:pointer;font-size:.9rem;transition:.15s}
    .btn-choose:hover{background:var(--blue-2)}
    /* Payment */
    .pay-layout{display:grid;grid-template-columns:1fr 340px;gap:22px;align-items:start}
    .pay-card{background:#fff;border:1px solid var(--line);border-radius:20px;padding:24px}
    .pay-card h2{margin:0 0 18px;color:var(--navy)}
    .pay-expert-row{display:flex;gap:14px;align-items:center;padding:14px;border:1px solid var(--line);border-radius:14px;margin-bottom:20px;background:var(--surface-2)}
    .pay-expert-row img{width:54px;height:54px;border-radius:50%;object-fit:cover}
    .pay-expert-row strong{display:block;color:var(--navy)}
    .pay-expert-row span{font-size:.84rem;color:var(--muted)}
    .pay-methods{display:grid;gap:10px;margin-bottom:20px}
    .pay-method{display:flex;align-items:center;gap:12px;padding:14px;border:2px solid var(--line);border-radius:14px;cursor:pointer;transition:.15s}
    .pay-method:hover{border-color:var(--blue)}
    .pay-method.selected{border-color:var(--blue);background:#EFF6FF}
    .pay-method-icon{font-size:1.4rem;width:36px;text-align:center}
    .pay-method-name{font-weight:750;color:var(--navy);flex:1}
    .pay-summary{background:var(--surface-2);border-radius:14px;padding:16px}
    .pay-row{display:flex;justify-content:space-between;padding:8px 0;font-size:.9rem;border-bottom:1px solid var(--line);color:var(--muted)}
    .pay-row:last-child{border-bottom:none}
    .pay-row.total{font-weight:900;font-size:1.05rem;color:var(--navy);padding-top:12px}
    /* Chat */
    .chat-shell{display:flex;flex-direction:column;height:calc(100vh - 180px);min-height:500px;background:#fff;border:1px solid var(--line);border-radius:20px;overflow:hidden;box-shadow:var(--shadow-soft)}
    .chat-header{background:var(--navy);padding:14px 18px;display:flex;align-items:center;gap:12px;flex-shrink:0}
    .chat-header-avatar{width:44px;height:44px;border-radius:50%;object-fit:cover;border:2px solid rgba(255,255,255,.3)}
    .chat-header-info{flex:1}
    .chat-header-name{color:#fff;font-weight:850;font-size:1rem;margin:0}
    .chat-header-status{color:rgba(255,255,255,.7);font-size:.8rem;display:flex;align-items:center;gap:5px}
    .chat-online-dot{width:8px;height:8px;border-radius:50%;background:#22c55e;display:inline-block}
    .chat-timer-wrap{background:var(--surface-2);border:2px solid var(--gold);border-radius:10px;padding:5px 12px;display:flex;align-items:center;gap:6px}
    .chat-timer{font-size:1.1rem;font-weight:950;color:var(--navy);font-variant-numeric:tabular-nums}
    .chat-timer.urgent{color:var(--danger);animation:timerPulse 1s ease-in-out infinite}
    @keyframes timerPulse{0%,100%{opacity:1}50%{opacity:.6}}
    .chat-messages{flex:1;overflow-y:auto;padding:16px;display:flex;flex-direction:column;gap:12px;background:linear-gradient(180deg,#F7FAFF 0%,#fff 100%)}
    .msg-row{display:flex;gap:8px;align-items:flex-end}
    .msg-row.user{flex-direction:row-reverse}
    .msg-avatar-small{width:32px;height:32px;border-radius:50%;object-fit:cover;flex-shrink:0}
    .msg-avatar-user{width:32px;height:32px;border-radius:50%;background:var(--blue);display:grid;place-items:center;color:#fff;font-weight:900;font-size:.9rem;flex-shrink:0}
    .msg-bubble{max-width:70%;padding:11px 14px;border-radius:18px;font-size:.9rem;line-height:1.5}
    .msg-bubble.consultant{background:#fff;border:1px solid var(--line);border-bottom-left-radius:4px;color:var(--ink)}
    .msg-bubble.user{background:var(--blue);color:#fff;border-bottom-right-radius:4px}
    .msg-time{font-size:.7rem;color:var(--muted);margin-top:4px;display:block}
    .msg-typing{display:flex;gap:4px;align-items:center;padding:11px 14px;background:#fff;border:1px solid var(--line);border-radius:18px;border-bottom-left-radius:4px;width:60px}
    .msg-typing span{width:8px;height:8px;border-radius:50%;background:var(--muted);animation:typingDot .9s ease-in-out infinite}
    .msg-typing span:nth-child(2){animation-delay:.18s}
    .msg-typing span:nth-child(3){animation-delay:.36s}
    @keyframes typingDot{0%,80%,100%{transform:scale(0.6);opacity:.5}40%{transform:scale(1);opacity:1}}
    .chat-quick-replies{padding:8px 14px;display:flex;gap:8px;overflow-x:auto;flex-shrink:0;border-top:1px solid var(--line);background:#fff}
    .quick-reply-chip{white-space:nowrap;border:1px solid var(--blue);color:var(--blue);background:#fff;border-radius:999px;padding:7px 13px;font-size:.82rem;font-weight:700;cursor:pointer;transition:.15s}
    .quick-reply-chip:hover{background:var(--blue);color:#fff}
    .chat-input-bar{display:flex;gap:8px;align-items:center;padding:12px 14px;border-top:1px solid var(--line);flex-shrink:0;background:#fff}
    .chat-input{flex:1;border:1px solid var(--line);border-radius:12px;padding:10px 13px;font-size:.9rem;outline:none;resize:none;max-height:80px;overflow-y:auto}
    .chat-input:focus{border-color:var(--blue);box-shadow:var(--focus)}
    .chat-send-btn{background:var(--blue);color:#fff;border:none;border-radius:12px;width:42px;height:42px;display:grid;place-items:center;cursor:pointer;flex-shrink:0;transition:.15s}
    .chat-send-btn:hover{background:var(--blue-2)}
    .chat-attach-btn{background:var(--surface-2);color:var(--muted);border:1px solid var(--line);border-radius:12px;width:42px;height:42px;display:grid;place-items:center;cursor:pointer;font-size:1.1rem;flex-shrink:0}
    /* Rating modal */
    .stars-wrap{display:flex;gap:8px;justify-content:center;margin:16px 0}
    .star-btn{font-size:2rem;cursor:pointer;transition:transform .15s;opacity:.3}
    .star-btn.active{opacity:1}
    .star-btn:hover{transform:scale(1.2)}
    /* Responsive result */
    @media(max-width:860px){
      .gauge-grid{grid-template-columns:repeat(2,1fr)}
      .pay-layout{grid-template-columns:1fr}
      .result-full-width{grid-column:1!important}
    }
    @media(max-width:680px){
      .result-two-col{grid-template-columns:1fr!important}
    }
    @media(max-width:480px){
      .gauge-grid{grid-template-columns:repeat(2,1fr);gap:10px}
      .expert-grid{grid-template-columns:1fr}
      .pay-layout{grid-template-columns:1fr}
      .chat-shell{height:calc(100vh - 140px)}
    }

    /* ===== PRICING PAGE ===== */
    .pricing-hero{text-align:center;padding:40px 20px 28px;max-width:680px;margin:0 auto}
    .pricing-hero h1{font-size:2rem;color:var(--navy);margin:0 0 12px;letter-spacing:-.03em}
    .pricing-hero p{color:var(--muted);font-size:1rem;line-height:1.6;margin:0 0 24px}
    .pricing-toggle{display:inline-flex;background:var(--surface-3);border-radius:999px;padding:4px;gap:4px;margin-bottom:36px}
    .pricing-toggle button{border:none;border-radius:999px;padding:9px 22px;font-weight:800;font-size:.88rem;cursor:pointer;transition:.2s;background:transparent;color:var(--muted)}
    .pricing-toggle button.active{background:#fff;color:var(--navy);box-shadow:0 2px 8px rgba(7,27,51,.12)}
    .pricing-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(240px,1fr));gap:18px;margin-bottom:28px}
    .price-card{background:#fff;border:1px solid var(--line);border-radius:20px;padding:24px;position:relative;transition:transform .16s,box-shadow .16s}
    .price-card:hover{transform:translateY(-3px);box-shadow:var(--shadow)}
    .price-card.popular{border-color:var(--blue);box-shadow:0 0 0 2px rgba(21,89,183,.15)}
    .price-card.popular:before{content:'Paling Populer';position:absolute;top:-1px;left:50%;transform:translateX(-50%);background:var(--blue);color:#fff;font-size:.7rem;font-weight:900;padding:5px 14px;border-radius:0 0 12px 12px;white-space:nowrap}
    .price-tier{font-size:.78rem;font-weight:900;text-transform:uppercase;letter-spacing:.08em;color:var(--muted);margin-bottom:10px}
    .price-amount{font-size:2rem;font-weight:950;color:var(--navy);line-height:1;margin-bottom:4px}
    .price-amount small{font-size:.75rem;font-weight:600;color:var(--muted)}
    .price-desc{font-size:.84rem;color:var(--muted);margin-bottom:16px;line-height:1.4}
    .price-features{list-style:none;padding:0;margin:0 0 20px;display:grid;gap:7px}
    .price-features li{font-size:.84rem;color:var(--ink);display:flex;gap:8px;align-items:flex-start}
    .price-features li:before{content:'\2713';color:var(--success);font-weight:900;flex-shrink:0;margin-top:1px}
    .price-features li.dim:before{content:'\2013';color:var(--muted)}
    .price-features li.dim{color:var(--muted)}
    .btn-price{width:100%;border:none;border-radius:12px;padding:12px;font-weight:800;font-size:.9rem;cursor:pointer;transition:.15s}
    .btn-price.primary{background:var(--blue);color:#fff}.btn-price.primary:hover{background:var(--blue-2)}
    .btn-price.outline{background:transparent;border:2px solid var(--navy);color:var(--navy)}.btn-price.outline:hover{background:var(--navy);color:#fff}
    .btn-price.gold{background:var(--gold);color:#1E2A3D}.btn-price.gold:hover{background:var(--gold-2)}
    .addon-grid{display:grid;grid-template-columns:repeat(3,1fr);gap:14px;margin-top:8px}
    .addon-card{background:#fff;border:1px solid var(--line);border-radius:16px;padding:18px;text-align:center}
    .addon-icon{font-size:1.8rem;margin-bottom:10px}

    /* ===== TAX OBLIGATION SIMULATOR ===== */

    .sim-results{display:grid;grid-template-columns:repeat(3,1fr);gap:12px;margin-top:4px}
    .sim-result-card{border-radius:16px;padding:18px;border:1px solid var(--line)}

    .sim-btn{background:var(--blue);color:#fff;border:none;border-radius:12px;padding:11px 20px;font-weight:800;font-size:.88rem;cursor:pointer;width:100%;transition:.15s}
    .sim-btn:hover{background:var(--blue-2)}
    /* ===== REGULATION CITATION ===== */
    .citation-list{display:grid;gap:10px}
    .citation-item{border:1px solid var(--line);border-radius:14px;overflow:hidden;background:#fff}
    .citation-header{display:flex;align-items:center;gap:12px;padding:14px 16px;cursor:pointer;transition:background .15s}

    .citation-badge{font-size:.68rem;font-weight:900;padding:3px 8px;border-radius:999px;white-space:nowrap}

    .citation-badge.perhatian{background:#FEF9C3;color:#854D0E;border:1px solid #FDE047}
    .citation-badge.baru{background:#DBEAFE;color:#1E40AF;border:1px solid #BFDBFE}

    .citation-relevance strong{color:var(--navy)}
    /* ===== FREE AI CHATBOT ===== */

    .chatbot-header{background:linear-gradient(135deg,var(--navy),var(--blue));padding:16px 20px;display:flex;align-items:center;gap:12px}

    .chatbot-messages{height:260px;overflow-y:auto;padding:16px;display:flex;flex-direction:column;gap:10px;background:var(--surface-2)}
    .cbot-msg{max-width:82%;padding:10px 14px;border-radius:16px;font-size:.88rem;line-height:1.5}
    .cbot-msg.bot{background:#fff;border:1px solid var(--line);border-bottom-left-radius:4px;color:var(--ink);align-self:flex-start}
    .cbot-msg.user{background:var(--blue);color:#fff;border-bottom-right-radius:4px;align-self:flex-end}
    .chatbot-suggestions{padding:10px 14px;display:flex;gap:7px;flex-wrap:wrap;background:#fff;border-top:1px solid var(--line)}
    .cbot-chip{border:1px solid var(--line);background:var(--surface-2);color:var(--navy);border-radius:999px;padding:6px 12px;font-size:.78rem;font-weight:700;cursor:pointer;transition:.15s;white-space:nowrap}
    .cbot-chip:hover{background:var(--navy);color:#fff;border-color:var(--navy)}
    .chatbot-input-row{display:flex;border-top:1px solid var(--line)}
    .chatbot-input{flex:1;border:none;padding:14px 16px;font-size:.9rem;outline:none;resize:none;min-height:48px;max-height:100px}
    .chatbot-send{background:var(--blue);color:#fff;border:none;padding:0 20px;font-weight:800;font-size:.9rem;cursor:pointer;transition:.15s;flex-shrink:0}
    .chatbot-send:hover{background:var(--blue-2)}
    .chatbot-upgrade-hint{font-size:.78rem;color:var(--muted);text-align:center;padding:8px 14px;border-top:1px solid var(--line)}

    function getCoretaxGuide(){
      const t = new Set(appState.tags);
      const primary = guideModules[appState.pathway.moduleKey] || guideModules.unsure;
      const guide = [...primary];
      if(t.has('coretax_problem') && appState.pathway.moduleKey !== 'account_problem'){
        guide.push(['Jika akses bermasalah', 'Gunakan jalur perbaikan akun: catat error, jangan mencoba password berulang, gunakan reset resmi, lalu hubungi bantuan resmi bila tetap gagal.', 'Tambahan']);
      }
      if((t.has('type_employee_side') || t.has('has_side_income')) && appState.pathway.moduleKey === 'employee'){
        guide.push(['Tambahkan penghasilan sampingan', 'Setelah bagian gaji selesai, cari bagian penghasilan lain, usaha, freelance, atau tambahan sesuai kondisi. Jangan hanya mengisi data gaji.', 'Tambahan']);
      }
      if(t.has('need_documents')){
        guide.push(['Gunakan checklist sebelum submit', 'Berhenti di halaman ringkasan jika checklist dokumen belum lengkap. Lengkapi dahulu agar tidak perlu koreksi setelah kirim.', 'Tambahan']);
      }
      if(t.has('need_simulation')){
        guide.push(['Gunakan ruang persiapan', 'Isi estimasi pada ruang persiapan PanduCore hanya untuk menyusun dokumen dan alur kerja. Data resmi tetap diisi di kanal resmi.', 'Tambahan']);
      }
      return guide;
    }

    function sanitizeQuestionData(){
      const fix = (id, value, desc, tags) => {
        const item = questions.find(x=>x.id===id);
        if(!item) return;
        const op = item.options.find(o=>o.value===value);
        if(!op) return;
        op.desc = desc;
        op.tags = tags;
      };
      fix('coretax_guide_need','no','Saya cukup butuh ringkasan dokumen.',['skip_coretax_guide']);
      fix('workspace_need','no','Saya ingin langsung ke hasil.',['skip_workspace']);
      fix('export_need','yes','Saya ingin tombol cetak dan simpan.',['need_export']);
      fix('export_need','no','Saya cukup melihat hasil di layar.',['no_export']);
    }
    sanitizeQuestionData();

    const main = document.getElementById('main');
    const progressBar = document.getElementById('progressBar');
    const progressText = document.getElementById('progressText');
    const progressPercent = document.getElementById('progressPercent');
    const headerStatus = document.getElementById('headerStatus');
    const modalBackdrop = document.getElementById('modalBackdrop');
    const modalBody = document.getElementById('modalBody');
    const modalTitle = document.getElementById('modalTitle');

    function saveState(){ localStorage.setItem(STORAGE_KEY, JSON.stringify(appState)); }
    function loadState(){
      const raw = localStorage.getItem(STORAGE_KEY);
      if(!raw) return;
      try{
        const saved = JSON.parse(raw);
        Object.assign(appState, saved);
        appState.user = Object.assign({displayName:'',loginConfirmed:false}, saved.user || {});
        appState.settings = Object.assign({layoutMode:'',languageLevel:''}, saved.settings || {});
        appState.answers = saved.answers || {};
        appState.workspace = saved.workspace || {};
        appState.scores = Object.assign({readiness:0,risk:0,literacyNeed:0,documentCompleteness:0}, saved.scores || {});
        appState.checklist = saved.checklist || {};
        appState.roadmapDone = saved.roadmapDone || {};
        appState.consult = Object.assign({selectedExpert:null,paymentMethod:null,sessionStartTime:null,messages:[],rating:0}, saved.consult || {});
        appState.calMonth = saved.calMonth || null;
      }catch(e){ localStorage.removeItem(STORAGE_KEY); }
    }

    function setStep(step){ appState.step = step; saveState(); render(); }
    function setLayoutMode(mode){ appState.settings.layoutMode = mode; document.body.classList.toggle('mobile-mode', mode === 'mobile'); document.body.classList.toggle('desktop-mode', mode === 'desktop'); saveState(); }
    function currentLang(){ return appState.settings.languageLevel || 'simple'; }
    function getQuestionText(question){
      const level = currentLang();
      return level === 'detailed' ? question.detailedText : level === 'standard' ? question.standardText : question.simpleText;
    }
    function visibleQuestions(){ return questions.filter(question => !question.visibleIf || question.visibleIf(appState)); }
    function escapeHTML(str){ return String(str || '').replace(/[&<>'"]/g, ch => ({'&':'&amp;','<':'&lt;','>':'&gt;',"'":'&#039;','"':'&quot;'}[ch])); }
    function pct(value){ return Math.max(0, Math.min(100, Math.round(value))); }

    function updateProgress(){
      let p = stepProgress[appState.step] || 0;
      if(appState.step === 'questionnaire'){
        const list = visibleQuestions();
        p = 44 + Math.round(((appState.questionIndex + 1) / Math.max(list.length,1)) * 22);
      }
      progressBar.style.width = p + '%';
      progressPercent.textContent = p + '%';
      progressText.textContent = getStepLabel(appState.step);
      headerStatus.textContent = getHeaderStatus();

    function renderSimulator(turnover,hasSalary){
      var salaryMap={'none':0,'under60':45000000,'60to250':140000000,'above250':300000000};
      var turnoverMap={'under_100':60000000,'100_500':280000000,'500_4b':2000000000,'unknown':100000000};
      var sal=salaryMap[hasSalary]||0;
      var omz=turnoverMap[turnover]||0;
      var ptkp=54000000;
      var pkp=Math.max(0,sal-ptkp);
      var pphA=pkp<=60000000?pkp*0.05:(pkp<=250000000?3000000+(pkp-60000000)*0.15:(pkp<=500000000?31500000+(pkp-250000000)*0.25:93500000+(pkp-500000000)*0.30));
      var pphB=omz*0.005;
      var pphC=pphA+pphB;
      function fmt(n){return 'Rp '+Math.round(n).toLocaleString('id-ID');}
      var results=[
        {cls:'scenario-a',lbl:'a',lt:'Skenario A',title:'PPh 21 Karyawan',amount:fmt(pphA),note:'Estimasi PPh terutang berdasarkan gaji dan PTKP Rp 54 juta (TK/0).'},
        {cls:'scenario-b',lbl:'b',lt:'Skenario B',title:'PPh Final UMKM 0,5%',amount:fmt(pphB),note:'Estimasi PPh Final dari omzet. Bisa dipilih jika omzet di bawah Rp 4,8 miliar.'},
        {cls:'scenario-c',lbl:'c',lt:'Skenario C',title:'Gabungan (A+B)',amount:fmt(pphC),note:'Jika memiliki penghasilan gaji dan penghasilan usaha sekaligus.'}
      ];
      return '<div class="sim-results">'+results.map(function(r){
        return '<div class="sim-result-card '+r.cls+'">'
          +'<div class="sim-scenario-label '+r.lbl+'">'+r.lt+'</div>'
          +'<div class="sim-scenario-title">'+r.title+'</div>'
          +'<div class="sim-amount">'+r.amount+'<small>/tahun</small></div>'
          +'<div class="sim-note">'+r.note+'</div></div>';
      }).join('')+'</div>'
      +'<div class="sim-disclaimer"><span>&#9888;</span><span>Angka di atas adalah <strong>estimasi ilustrasi</strong> berdasarkan asumsi sederhana. Bukan perhitungan resmi. Gunakan kanal resmi DJP untuk perhitungan final.</span></div>';
    }

    function collectTagsAndScores(){
      const tags = new Set();
      let readiness = 35, risk = 20, literacyNeed = 15, documentCompleteness = 20;
      Object.entries(appState.answers).forEach(([id,value]) => {
        const question = questions.find(q=>q.id===id);
        if(!question) return;
        const option = question.options.find(o=>o.value===value);
        if(!option) return;
        (option.tags || []).forEach(t=>tags.add(t));
        const score = option.score || {};
        readiness += score.readiness || 0;
        risk += score.risk || 0;
        literacyNeed += score.literacyNeed || 0;
        documentCompleteness += score.documentCompleteness || 0;
      });
      if(tags.has('npwp_none')){ risk += 8; literacyNeed += 8; readiness -= 8; }
      if(tags.has('type_msme')){ risk += 8; }
      if(tags.has('type_marketplace')){ risk += 6; }
      if(tags.has('docs_high')){ readiness += 10; documentCompleteness += 10; risk -= 6; }
      if(tags.has('docs_low')){ readiness -= 10; risk += 10; documentCompleteness -= 8; }
      if(appState.workspace.hasSalesRecord === 'Ada dan rapi'){ readiness += 8; documentCompleteness += 8; }
      if(appState.workspace.hasSlip === 'Ada'){ readiness += 6; documentCompleteness += 8; }
      appState.tags = Array.from(tags);
      appState.scores = { readiness:pct(readiness), risk:pct(risk), literacyNeed:pct(literacyNeed), documentCompleteness:pct(documentCompleteness) };
      buildPathway();
    }

        if(e.recurringMonthly) return e.day===day;
        return e.month===month && e.day===day;
      });
    }

    function getUpcomingEvents(){
      const today = new Date();
      const results = [];
      for(let m=0;m<12;m++){
        for(let d=1;d<=31;d++){
          const checkDate = new Date(today.getFullYear(),today.getMonth()+Math.floor(m/1),d);
          if(isNaN(checkDate.getTime())) continue;
          const evts = getEventsForDay(checkDate.getFullYear(),checkDate.getMonth(),d);
          evts.forEach(e=>{
            const diff = Math.ceil((checkDate-today)/(1000*60*60*24));
            if(diff>=0 && diff<=90) results.push({...e,date:checkDate,diff});
          });
        }
        if(results.length>=5) break;
      }
      results.sort((a,b)=>a.diff-b.diff);
      const seen=new Set();
      return results.filter(r=>{
        const key=r.label+r.diff;
        if(seen.has(key)) return false;
        seen.add(key);
        return true;
      }).slice(0,4);
    }

    function renderGauge(label,value,type){
      const r=36,circ=2*Math.PI*r;
      let color='#1559B7';
      if(type==='risiko'){ color=value>=65?'#B42318':value>=40?'#B7791F':'#157347'; }
      else{ color=value>=70?'#157347':value>=40?'#B7791F':'#B42318'; }
      let ctx='';
      if(type==='kesiapan') ctx=value>=70?'Lebih baik dari rata-rata':value>=40?'Perlu persiapan lanjut':'Perlu perhatian khusus';
      else if(type==='risiko') ctx=value>=65?'Risiko tinggi':value>=40?'Risiko sedang':'Risiko rendah';
      else if(type==='dokumen') ctx=value>=70?'Dokumen relatif lengkap':value>=40?'Ada dokumen yang kurang':'Dokumen perlu dilengkapi';
      else ctx=value>=70?'Butuh pendalaman lebih':value>=40?'Cukup familiar':'Pemula ΓÇö panduan lengkap tersedia';
      return `<div class="gauge-wrap">
        <div class="gauge-svg-wrap">
          <svg class="gauge-svg" width="84" height="84" viewBox="0 0 84 84">
            <circle class="gauge-bg" cx="42" cy="42" r="${r}"/>
            <circle class="gauge-fill" id="g_${type}" cx="42" cy="42" r="${r}" stroke="${color}" stroke-dasharray="${circ}" stroke-dashoffset="${circ}" data-val="${value}" data-circ="${circ}"/>
          </svg>
          <div class="gauge-inner"><div class="gauge-num" id="gn_${type}">0</div><div class="gauge-pct">%</div></div>
        </div>
        <div class="gauge-lbl">${label}</div>
        <div class="gauge-ctx">${ctx}</div>
      </div>`;
    }

    function animateGauges(){
      ['kesiapan','risiko','dokumen','literasi'].forEach(type=>{
        const circle=document.getElementById('g_'+type);
        const numEl=document.getElementById('gn_'+type);
        if(!circle||!numEl) return;
        const val=parseFloat(circle.dataset.val)||0;
        const circ=parseFloat(circle.dataset.circ)||226;
        const offset=circ-(val/100)*circ;
        circle.style.strokeDashoffset=offset;
        let current=0;
        const step=val/60;
        const interval=setInterval(()=>{
          current=Math.min(current+step,val);
          numEl.textContent=Math.round(current);
          if(current>=val) clearInterval(interval);
        },20);
      });
    }

    function renderCalendar(){
      const today=new Date();
      const viewDate=appState.calMonth?new Date(appState.calMonth):new Date(today.getFullYear(),today.getMonth(),1);
      const year=viewDate.getFullYear(),month=viewDate.getMonth();
      const firstDay=new Date(year,month,1).getDay();
      const daysInMonth=new Date(year,month+1,0).getDate();
      const monthNames=['Januari','Februari','Maret','April','Mei','Juni','Juli','Agustus','September','Oktober','November','Desember'];
      const dayNames=['Min','Sen','Sel','Rab','Kam','Jum','Sab'];
      let calHTML=`<div class="cal-header-bar">
        <button class="cal-nav" onclick="calNavigate(-1)" type="button">ΓÇ╣</button>
        <h3>${monthNames[month]} ${year}</h3>
        <button class="cal-nav" onclick="calNavigate(1)" type="button">ΓÇ║</button>
      </div>
      <div class="cal-weekdays">${dayNames.map(d=>`<span>${d}</span>`).join('')}</div>
      <div class="cal-grid">`;
      // Empty cells before first day
      for(let i=0;i<firstDay;i++) calHTML+=`<div class="cal-day empty"></div>`;
      for(let d=1;d<=daysInMonth;d++){
        const isToday=today.getDate()===d&&today.getMonth()===month&&today.getFullYear()===year;
        const evts=getEventsForDay(year,month,d);
        let cls='cal-day';
        if(isToday) cls+=' today';
        if(evts.length>0){
          cls+=' event';
          const t=evts[0].type;
          cls+=` event-${t}`;
        }
        calHTML+=`<div class="${cls}" title="${evts.map(e=>e.label).join(', ')}"><span class="cal-day-num">${d}</span>${evts.length>0?`<div class="cal-day-dot" style="background:${evts[0].type==='red'?'#B42318':evts[0].type==='gold'?'#B7791F':'#1559B7'}"></div>`:''}</div>`;
      }
      calHTML+=`</div>`;
      // Upcoming events
      const upcoming=getUpcomingEvents();
      calHTML+=`<div class="cal-countdown-list">`;
      upcoming.forEach(e=>{
        const urgCls=e.diff<=7?'urgent':e.diff<=30?'soon':'ok';
        const dayLabel=e.diff===0?'Hari ini':e.diff===1?'Besok':`${e.diff} hari lagi`;
        calHTML+=`<div class="cal-countdown-item"><div class="cal-evt-icon">${e.icon}</div><div class="cal-evt-info"><strong>${e.label}</strong><span>${e.date.toLocaleDateString('id-ID',{day:'numeric',month:'long',year:'numeric'})}</span></div><div class="cal-evt-days ${urgCls}">${dayLabel}</div></div>`;
      });
      calHTML+=`</div>`;
      return calHTML;
    }

    function getAutoReply(text){
      const lower=text.toLowerCase();
      const profile=appState.pathway?appState.pathway.profile:'wajib pajak';
      let pool=botReplies.default;
      if(lower.includes('dokumen')||lower.includes('bukti')||lower.includes('berkas')) pool=botReplies.dokumen;
      else if(lower.includes('spt')||lower.includes('lapor')||lower.includes('pertama')) pool=botReplies.spt;
      else if(lower.includes('pph')||lower.includes('pajak penghasilan')||lower.includes('final')||lower.includes('21')||lower.includes('25')) pool=botReplies.pph;
      else if(lower.includes('coretax')||lower.includes('login')||lower.includes('akun')||lower.includes('sistem')) pool=botReplies.coretax;
      else if(lower.includes('ppn')||lower.includes('pkp')||lower.includes('faktur')) pool=botReplies.ppn;
      const reply=pool[Math.floor(Math.random()*pool.length)];
      return reply.replace('{profile}',profile);
    }

    function sendMessage(){

      const text=input.value.trim();
      if(!text) return;
      input.value='';
      const time=new Date().toLocaleTimeString('id-ID',{hour:'2-digit',minute:'2-digit'});
      const userMsg={from:'user',text,time};
      appState.consult.messages.push(userMsg);
      saveState();
      appendChatMessage(userMsg);
      showTypingIndicator();
      const delay=1500+Math.random()*2000;
      setTimeout(()=>{
        removeTypingIndicator();
        const replyText=getAutoReply(text);
        const replyMsg={from:'consultant',text:replyText,time:new Date().toLocaleTimeString('id-ID',{hour:'2-digit',minute:'2-digit'})};
        appState.consult.messages.push(replyMsg);
        saveState();
        appendChatMessage(replyMsg);
      },delay);

    function startChatTimer(){
      if(_chatTimer) clearInterval(_chatTimer);
      const totalSecs=60*60;
      function update(){
        const elapsed=Math.floor((Date.now()-(appState.consult.sessionStartTime||Date.now()))/1000);
        const remaining=Math.max(0,totalSecs-elapsed);
        const m=Math.floor(remaining/60),s=remaining%60;
        const timerEl=document.getElementById('chatTimerDisplay');
        if(!timerEl){clearInterval(_chatTimer);return;}
        timerEl.textContent=String(m).padStart(2,'0')+':'+String(s).padStart(2,'0');
        if(remaining<=600) timerEl.classList.add('urgent');
        if(remaining===0){clearInterval(_chatTimer);showSessionEndModal();}
      }
      update();
      _chatTimer=setInterval(update,1000);
    }

    document.getElementById('modalClose').addEventListener('click',()=>modalBackdrop.classList.remove('open'));
    modalBackdrop.addEventListener('click',(e)=>{ if(e.target === modalBackdrop) modalBackdrop.classList.remove('open'); });
    document.getElementById('helpBtn').addEventListener('click',()=>openInfoModal('Bantuan PanduCore', aboutHTML()));
    document.getElementById('restartTopBtn').addEventListener('click',()=>restartApp());
    function restartApp(){ localStorage.removeItem(STORAGE_KEY); location.reload(); }

    loadState();
    if(!appState.step) appState.step = 'welcome';
    render();
  </script>
</body>
</html>
